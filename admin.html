<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Admin — KAYJDE IMMO</title>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --lagoon:#15332D;--lagoon-light:#1F4A41;--rust:#C8602F;--rust-light:#E07A45;
  --sand:#F3ECDC;--sand-deep:#E7DCC2;--grey:#454A48;--foam:#fff;--gold:#C9A96E;
  --ok:#3F7A5C;--warn:#B0432F;--radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--sand);font-family:'Inter',sans-serif;color:var(--grey);padding-bottom:40px;-webkit-font-smoothing:antialiased;}
.stencil{font-family:'Big Shoulders Display',sans-serif;font-weight:800;text-transform:uppercase;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.login-box{background:var(--lagoon);border-radius:20px;padding:36px 28px;width:100%;max-width:360px;text-align:center;}
.login-logo{color:var(--gold);font-size:28px;letter-spacing:0.04em;margin-bottom:4px;}
.login-sub{color:rgba(243,236,220,0.6);font-size:13px;margin-bottom:28px;}
.login-box input[type=password]{width:100%;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.15);border-radius:10px;padding:13px 16px;color:#fff;font-size:16px;font-family:'Inter',sans-serif;margin-bottom:14px;letter-spacing:0.1em;}
.login-box input[type=password]::placeholder{color:rgba(255,255,255,0.35);letter-spacing:0;}
.login-btn{width:100%;background:var(--rust);color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;}
.login-btn:hover{background:var(--rust-light);}
.login-err{color:#ff9a9a;font-size:13px;margin-top:8px;display:none;}

/* TOPBAR */
.topbar{background:var(--lagoon);color:var(--sand);padding:16px 18px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:20;}
.topbar-title{font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:20px;letter-spacing:0.04em;}
.topbar-title span{color:var(--gold);}
.logout-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:var(--sand);border-radius:8px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;}

/* NAV TABS */
.nav-tabs{display:flex;overflow-x:auto;background:var(--lagoon-light);scrollbar-width:none;border-bottom:1px solid rgba(0,0,0,0.15);}
.nav-tabs::-webkit-scrollbar{display:none;}
.nav-tab{flex-shrink:0;padding:12px 16px;color:rgba(243,236,220,0.5);font-size:12px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;cursor:pointer;border:none;background:none;white-space:nowrap;position:relative;}
.nav-tab.active{color:var(--sand);}
.nav-tab.active::after{content:"";position:absolute;bottom:0;left:12px;right:12px;height:3px;background:var(--rust);border-radius:3px 3px 0 0;}

/* MAIN */
main{padding:18px;max-width:600px;margin:0 auto;}
.section-title{font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:22px;color:var(--lagoon);margin-bottom:16px;letter-spacing:0.02em;}
.card{background:var(--foam);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(21,51,45,0.08);}
.card-title{font-weight:700;font-size:15px;color:var(--lagoon);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.card-title .ic{font-size:18px;}
label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#8b8378;display:block;margin-bottom:5px;}
input[type=text],input[type=password],input[type=number],textarea,select{width:100%;border:1.5px solid var(--sand-deep);border-radius:9px;padding:10px 12px;font-size:14px;font-family:'Inter',sans-serif;color:var(--grey);background:var(--sand);margin-bottom:12px;}
input[type=text]:focus,textarea:focus,select:focus{outline:none;border-color:var(--rust);}
textarea{min-height:80px;resize:vertical;}
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--sand-deep);}
.toggle-row:last-child{border-bottom:none;}
.toggle-label{font-size:14px;font-weight:500;}
.toggle{position:relative;width:46px;height:26px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.slider{position:absolute;inset:0;background:#ccc;border-radius:26px;cursor:pointer;transition:.3s;}
.slider::before{content:"";position:absolute;height:20px;width:20px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;}
input:checked + .slider{background:var(--ok);}
input:checked + .slider::before{transform:translateX(20px);}

/* BUNGALOW SELECTOR */
.bung-selector{display:flex;gap:8px;margin-bottom:18px;overflow-x:auto;scrollbar-width:none;}
.bung-selector::-webkit-scrollbar{display:none;}
.bung-btn{flex-shrink:0;background:var(--foam);border:1.5px solid var(--sand-deep);border-radius:10px;padding:10px 16px;font-weight:700;font-size:14px;cursor:pointer;color:var(--grey);}
.bung-btn.active{background:var(--lagoon);color:var(--sand);border-color:var(--lagoon);}

/* LIST ITEMS */
.list-item{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.list-item input{margin-bottom:0;flex:1;}
.del-btn{background:#fbeae6;border:none;border-radius:7px;padding:8px 10px;color:var(--warn);font-size:14px;cursor:pointer;flex-shrink:0;}
.add-btn{background:var(--sand);border:1.5px dashed var(--sand-deep);border-radius:9px;padding:9px;width:100%;font-size:13px;font-weight:600;color:#8b8378;cursor:pointer;margin-top:4px;}
.add-btn:hover{border-color:var(--rust);color:var(--rust);}

/* SAVE */
.save-bar{position:fixed;bottom:0;left:0;right:0;background:var(--lagoon);padding:12px 18px;padding-bottom:calc(12px + env(safe-area-inset-bottom));display:flex;gap:10px;z-index:20;}
.save-btn{flex:1;background:var(--rust);color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;}
.save-btn:hover{background:var(--rust-light);}
.preview-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:var(--sand);border-radius:10px;padding:13px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--ok);color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:600;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
.muted{color:#8b8378;font-size:12px;margin-top:-8px;margin-bottom:12px;}

/* SECTION LABELS */
.section-label{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--rust);margin:18px 0 10px;}
.section-label:first-child{margin-top:0;}

.hidden{display:none!important;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-wrap">
  <div class="login-box">
    <div class="login-logo stencil">KAYJDE IMMO</div>
    <div class="login-sub">Panneau d'administration</div>
    <input type="password" id="pwdInput" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')tryLogin()">
    <button class="login-btn" onclick="tryLogin()">Accéder</button>
    <div class="login-err" id="loginErr">Mot de passe incorrect</div>
  </div>
</div>

<!-- ADMIN -->
<div id="adminScreen" class="hidden">
  <div class="topbar">
    <div class="topbar-title stencil">KAYJDE <span>ADMIN</span></div>
    <button class="logout-btn" onclick="logout()">Déconnexion</button>
  </div>

  <nav class="nav-tabs" id="navTabs">
    <button class="nav-tab active" data-tab="bungalows">🏠 Bungalows</button>
    <button class="nav-tab" data-tab="bonsplans">✨ Bons plans</button>
    <button class="nav-tab" data-tab="restaurants">🍽️ Restos</button>
    <button class="nav-tab" data-tab="activites">🤿 Activités</button>
    <button class="nav-tab" data-tab="nouveautes">🆕 Nouveautés</button>
  </nav>

  <main id="mainContent"></main>

  <div class="save-bar">
    <button class="preview-btn" onclick="openGuide()">👁 Voir le guide</button>
    <button class="save-btn" onclick="saveAll()">💾 Enregistrer</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   MOT DE PASSE ADMIN — changez-le ici
   ============================================================ */
const ADMIN_PASSWORD = "KayjdeImmo2026!";

/* ============================================================
   LIEN VERS LE GUIDE
   ============================================================ */
const GUIDE_URL = "https://contactkayjdeimmo-byte.github.io/Guide-bienvenue-kayjdeimmo";

/* ============================================================
   DONNÉES PAR DÉFAUT
   ============================================================ */
const DEFAULT_DATA = {
  bungalows:[
    {id:1,ssid:"SteLuce-Bungalow-01",pass:"AmbreLagon26!",checkin:"15:00",checkout:"11:00",
     infoProprio:"",equipExtra:[],
     fetesAutorisees:null,visiteursMax:null,parking:"",reglesPerso:[]},
    {id:2,ssid:"SteLuce-Bungalow-02",pass:"CorailVague26!",checkin:"15:00",checkout:"11:00",
     infoProprio:"",equipExtra:[],
     fetesAutorisees:null,visiteursMax:null,parking:"",reglesPerso:[]},
    {id:3,ssid:"SteLuce-Bungalow-03",pass:"SableDoux26!",checkin:"15:00",checkout:"11:00",
     infoProprio:"",equipExtra:[],
     fetesAutorisees:null,visiteursMax:null,parking:"",reglesPerso:[]},
    {id:4,ssid:"SteLuce-Bungalow-04",pass:"GoldenBay26!",checkin:"15:00",checkout:"11:00",
     infoProprio:"",equipExtra:[],
     fetesAutorisees:null,visiteursMax:null,parking:"",reglesPerso:[]},
    {id:5,ssid:"SteLuce-Bungalow-05",pass:"LagonBleu26!",checkin:"15:00",checkout:"11:00",
     infoProprio:"",equipExtra:[],
     fetesAutorisees:null,visiteursMax:null,parking:"",reglesPerso:[]},
  ],
  bonsplans:[],
  restaurantsExtra:[],
  activitesExtra:[],
  nouveautes:[]
};

/* ============================================================
   STATE
   ============================================================ */
let data = JSON.parse(JSON.stringify(DEFAULT_DATA));
let currentTab = "bungalows";
let currentBungalow = 1;

/* ============================================================
   LOGIN
   ============================================================ */
function tryLogin(){
  const val = document.getElementById("pwdInput").value;
  if(val === ADMIN_PASSWORD){
    document.getElementById("loginScreen").classList.add("hidden");
    document.getElementById("adminScreen").classList.remove("hidden");
    loadData();
    renderTab();
  } else {
    document.getElementById("loginErr").style.display="block";
    document.getElementById("pwdInput").value="";
  }
}
function logout(){
  document.getElementById("adminScreen").classList.add("hidden");
  document.getElementById("loginScreen").classList.remove("hidden");
  document.getElementById("pwdInput").value="";
}

/* ============================================================
   STORAGE
   ============================================================ */
async function loadData(){
  try{
    const r = await window.storage.get("admin-data", false);
    if(r) data = JSON.parse(r.value);
  }catch(e){ console.log("Données par défaut chargées"); }
}
async function saveData(){
  try{
    await window.storage.set("admin-data", JSON.stringify(data), false);
    showToast("✓ Enregistré !");
  }catch(e){ showToast("Erreur de sauvegarde"); }
}
function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2500);
}

/* ============================================================
   TABS
   ============================================================ */
document.getElementById("navTabs").addEventListener("click", e=>{
  const btn = e.target.closest(".nav-tab");
  if(!btn) return;
  document.querySelectorAll(".nav-tab").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  currentTab = btn.dataset.tab;
  renderTab();
});

function renderTab(){
  const map = {
    bungalows: renderBungalows,
    bonsplans: renderBonsPlans,
    restaurants: renderRestaurants,
    activites: renderActivites,
    nouveautes: renderNouveautes
  };
  document.getElementById("mainContent").innerHTML = map[currentTab]();
}

/* ============================================================
   TAB BUNGALOWS
   ============================================================ */
function renderBungalows(){
  const b = data.bungalows.find(x=>x.id===currentBungalow);
  const selector = data.bungalows.map(x=>`
    <button class="bung-btn ${x.id===currentBungalow?"active":""}" onclick="selectBungalow(${x.id})">N°${x.id}</button>
  `).join("");

  const equipItems = (b.equipExtra||[]).map((eq,i)=>`
    <div class="list-item">
      <input type="text" value="${escHtml(eq)}" onchange="updateEquipExtra(${i},this.value)" placeholder="Ex: Jacuzzi privé">
      <button class="del-btn" onclick="removeEquipExtra(${i})">✕</button>
    </div>`).join("");

  const reglesItems = (b.reglesPerso||[]).map((r,i)=>`
    <div class="list-item">
      <input type="text" value="${escHtml(r)}" onchange="updateRegle(${i},this.value)" placeholder="Ex: Pas de musique après 22h">
      <button class="del-btn" onclick="removeRegle(${i})">✕</button>
    </div>`).join("");

  const fetesVal = b.fetesAutorisees===true?"oui":b.fetesAutorisees===false?"non":"nc";

  return`
    <h2 class="section-title" style="margin-top:18px;">Bungalows</h2>
    <div class="bung-selector">${selector}</div>

    <div class="card">
      <div class="card-title"><span class="ic">📶</span> Wi-Fi — Bungalow ${currentBungalow}</div>
      <label>Nom du réseau (SSID)</label>
      <input type="text" value="${escHtml(b.ssid)}" onchange="updateBung('ssid',this.value)">
      <label>Mot de passe</label>
      <input type="text" value="${escHtml(b.pass)}" onchange="updateBung('pass',this.value)">
    </div>

    <div class="card">
      <div class="card-title"><span class="ic">🕐</span> Horaires</div>
      <label>Heure d'arrivée (check-in)</label>
      <input type="text" value="${escHtml(b.checkin)}" onchange="updateBung('checkin',this.value)" placeholder="15:00">
      <label>Heure de départ (check-out)</label>
      <input type="text" value="${escHtml(b.checkout)}" onchange="updateBung('checkout',this.value)" placeholder="11:00">
    </div>

    <div class="card">
      <div class="card-title"><span class="ic">📝</span> Infos du propriétaire</div>
      <p class="muted">Visible dans l'onglet Logement du guide</p>
      <textarea onchange="updateBung('infoProprio',this.value)" placeholder="Ex: Climatisation à éteindre en journée. Compteur eau dans le local technique derrière la cuisine.">${escHtml(b.infoProprio||"")}</textarea>
    </div>

    <div class="card">
      <div class="card-title"><span class="ic">🛁</span> Équipements spécifiques</div>
      <p class="muted">Jacuzzi, barbecue, etc. — propres à ce bungalow</p>
      ${equipItems}
      <button class="add-btn" onclick="addEquipExtra()">+ Ajouter un équipement</button>
    </div>

    <div class="card">
      <div class="card-title"><span class="ic">📋</span> Règlement — Bungalow ${currentBungalow}</div>

      <label>Fêtes / réceptions</label>
      <select onchange="updateFetes(this.value)">
        <option value="nc" ${fetesVal==="nc"?"selected":""}>Non précisé</option>
        <option value="oui" ${fetesVal==="oui"?"selected":""}>Autorisées</option>
        <option value="non" ${fetesVal==="non"?"selected":""}>Non autorisées</option>
      </select>

      <label>Nombre max de visiteurs supplémentaires</label>
      <input type="number" min="0" max="20" value="${b.visiteursMax||""}" onchange="updateBung('visiteursMax',this.value?Number(this.value):null)" placeholder="Ex: 4">

      <label>Stationnement / parking</label>
      <input type="text" value="${escHtml(b.parking||"")}" onchange="updateBung('parking',this.value)" placeholder="Ex: 1 place réservée devant le bungalow">

      <label>Règles spécifiques du propriétaire</label>
      ${reglesItems}
      <button class="add-btn" onclick="addRegle()">+ Ajouter une règle</button>
    </div>
  `;
}

function selectBungalow(id){ currentBungalow=id; renderTab(); }
function updateBung(key,val){
  const b = data.bungalows.find(x=>x.id===currentBungalow);
  if(b) b[key]=val;
}
function updateFetes(val){
  const b = data.bungalows.find(x=>x.id===currentBungalow);
  if(!b) return;
  b.fetesAutorisees = val==="oui"?true:val==="non"?false:null;
}
function addEquipExtra(){
  const b = data.bungalows.find(x=>x.id===currentBungalow);
  b.equipExtra = b.equipExtra||[];
  b.equipExtra.push("");
  renderTab();
}
function updateEquipExtra(i,val){
  const b = data.bungalows.find(x=>x.id===currentBungalow);
  b.equipExtra[i]=val;
}
function removeEquipExtra(i){
  const b = data.bungalows.find(x=>x.id===currentBungalow);
  b.equipExtra.splice(i,1);
  renderTab();
}
function addRegle(){
  const b = data.bungalows.find(x=>x.id===currentBungalow);
  b.reglesPerso = b.reglesPerso||[];
  b.reglesPerso.push("");
  renderTab();
}
function updateRegle(i,val){
  const b = data.bungalows.find(x=>x.id===currentBungalow);
  b.reglesPerso[i]=val;
}
function removeRegle(i){
  const b = data.bungalows.find(x=>x.id===currentBungalow);
  b.reglesPerso.splice(i,1);
  renderTab();
}

/* ============================================================
   TAB BONS PLANS
   ============================================================ */
function renderBonsPlans(){
  const items = (data.bonsplans||[]).map((p,i)=>`
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <div class="card-title" style="margin-bottom:0;">✨ Bon plan ${i+1}</div>
        <button class="del-btn" onclick="removeBonPlan(${i})">✕ Supprimer</button>
      </div>
      <label>Nom / titre</label>
      <input type="text" value="${escHtml(p.name||"")}" onchange="data.bonsplans[${i}].name=this.value" placeholder="Ex: Soirée Jazz — Place des Fêtes">
      <label>Date / horaire</label>
      <input type="text" value="${escHtml(p.date||"")}" onchange="data.bonsplans[${i}].date=this.value" placeholder="Ex: Tous les mercredis, 19h">
      <label>Description</label>
      <textarea onchange="data.bonsplans[${i}].note=this.value" placeholder="Ex: Concert gratuit en plein air, ambiance conviviale.">${escHtml(p.note||"")}</textarea>
    </div>
  `).join("");

  return`
    <h2 class="section-title" style="margin-top:18px;">✨ Bons plans du moment</h2>
    <p class="muted" style="margin-bottom:16px;font-size:13px;">Soirées éphémères, événements ponctuels, actualités locales — apparaissent en premier dans l'onglet Alentours du guide.</p>
    ${items}
    <button class="add-btn" style="margin-top:4px;" onclick="addBonPlan()">+ Ajouter un bon plan</button>
  `;
}
function addBonPlan(){
  data.bonsplans = data.bonsplans||[];
  data.bonsplans.push({name:"",date:"",note:""});
  renderTab();
}
function removeBonPlan(i){
  data.bonsplans.splice(i,1);
  renderTab();
}

/* ============================================================
   TAB RESTAURANTS
   ============================================================ */
function renderRestaurants(){
  const items = (data.restaurantsExtra||[]).map((r,i)=>`
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <div class="card-title" style="margin-bottom:0;">🍽️ Restaurant ${i+1}</div>
        <button class="del-btn" onclick="removeResto(${i})">✕</button>
      </div>
      <label>Nom du restaurant</label>
      <input type="text" value="${escHtml(r.name||"")}" onchange="data.restaurantsExtra[${i}].name=this.value" placeholder="Ex: Le Ti'Punch Gourmand">
      <label>Spécialité / type de cuisine</label>
      <input type="text" value="${escHtml(r.badge||"")}" onchange="data.restaurantsExtra[${i}].badge=this.value" placeholder="Ex: Créole · Fruits de mer">
      <label>Note (sur 5)</label>
      <input type="number" min="0" max="5" step="0.1" value="${r.rating||""}" onchange="data.restaurantsExtra[${i}].rating=parseFloat(this.value)" placeholder="4.5">
      <label>Description</label>
      <textarea onchange="data.restaurantsExtra[${i}].note=this.value" placeholder="Ex: Ambiance décontractée, vue mer, spécialité langouste grillée.">${escHtml(r.note||"")}</textarea>
      <label>Lien Google Maps (optionnel)</label>
      <input type="text" value="${escHtml(r.maps||"")}" onchange="data.restaurantsExtra[${i}].maps=this.value" placeholder="https://maps.google.com/...">
    </div>
  `).join("");

  return`
    <h2 class="section-title" style="margin-top:18px;">🍽️ Nouveaux restaurants</h2>
    <p class="muted" style="margin-bottom:16px;font-size:13px;">Ajoutez ici les restaurants tendance du moment. Ils apparaîtront dans la liste des restaurants du guide.</p>
    ${items}
    <button class="add-btn" onclick="addResto()">+ Ajouter un restaurant</button>
  `;
}
function addResto(){
  data.restaurantsExtra = data.restaurantsExtra||[];
  data.restaurantsExtra.push({name:"",badge:"",rating:0,note:"",maps:""});
  renderTab();
}
function removeResto(i){
  data.restaurantsExtra.splice(i,1);
  renderTab();
}

/* ============================================================
   TAB ACTIVITÉS
   ============================================================ */
function renderActivites(){
  const cats = [
    {key:"nautique",label:"🤿 Activités nautiques"},
    {key:"enfants",label:"👦 Pour les enfants"},
    {key:"soirees",label:"🎉 Soirées & clubs"},
    {key:"histoire",label:"🏛️ Sites historiques"},
    {key:"spots",label:"📸 Spots photo"}
  ];
  const items = (data.activitesExtra||[]).map((a,i)=>`
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <div class="card-title" style="margin-bottom:0;">📍 Activité ${i+1}</div>
        <button class="del-btn" onclick="removeActivite(${i})">✕</button>
      </div>
      <label>Nom</label>
      <input type="text" value="${escHtml(a.name||"")}" onchange="data.activitesExtra[${i}].name=this.value" placeholder="Ex: Plongée sous-marine Anse Dufour">
      <label>Catégorie</label>
      <select onchange="data.activitesExtra[${i}].cat=this.value">
        ${cats.map(c=>`<option value="${c.key}" ${a.cat===c.key?"selected":""}>${c.label}</option>`).join("")}
      </select>
      <label>Badge / type</label>
      <input type="text" value="${escHtml(a.badge||"")}" onchange="data.activitesExtra[${i}].badge=this.value" placeholder="Ex: Plongée · Découverte">
      <label>Note (sur 5)</label>
      <input type="number" min="0" max="5" step="0.1" value="${a.rating||""}" onchange="data.activitesExtra[${i}].rating=parseFloat(this.value)">
      <label>Description</label>
      <textarea onchange="data.activitesExtra[${i}].note=this.value" placeholder="Décrivez l'activité...">${escHtml(a.note||"")}</textarea>
      <label>Lien Google Maps (optionnel)</label>
      <input type="text" value="${escHtml(a.maps||"")}" onchange="data.activitesExtra[${i}].maps=this.value" placeholder="https://maps.google.com/...">
    </div>
  `).join("");

  return`
    <h2 class="section-title" style="margin-top:18px;">🤿 Nouvelles activités</h2>
    <p class="muted" style="margin-bottom:16px;font-size:13px;">Ajoutez une nouvelle activité qui vient de s'ouvrir, ou un spot que vous souhaitez recommander.</p>
    ${items}
    <button class="add-btn" onclick="addActivite()">+ Ajouter une activité</button>
  `;
}
function addActivite(){
  data.activitesExtra = data.activitesExtra||[];
  data.activitesExtra.push({name:"",cat:"nautique",badge:"",rating:0,note:"",maps:""});
  renderTab();
}
function removeActivite(i){
  data.activitesExtra.splice(i,1);
  renderTab();
}

/* ============================================================
   TAB NOUVEAUTÉS
   ============================================================ */
function renderNouveautes(){
  const items = (data.nouveautes||[]).map((n,i)=>`
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <div class="card-title" style="margin-bottom:0;">✨ Nouveauté ${i+1}</div>
        <button class="del-btn" onclick="removeNouveaute(${i})">✕</button>
      </div>
      <label>Nom</label>
      <input type="text" value="${escHtml(n.name||"")}" onchange="data.nouveautes[${i}].name=this.value" placeholder="Ex: Marché nocturne du Vendredi">
      <label>Badge</label>
      <input type="text" value="${escHtml(n.badge||"")}" onchange="data.nouveautes[${i}].badge=this.value" placeholder="Ex: Nouveau · Tendance">
      <label>Description</label>
      <textarea onchange="data.nouveautes[${i}].note=this.value" placeholder="Décrivez en quelques mots...">${escHtml(n.note||"")}</textarea>
      <label>Lien Google Maps (optionnel)</label>
      <input type="text" value="${escHtml(n.maps||"")}" onchange="data.nouveautes[${i}].maps=this.value" placeholder="https://maps.google.com/...">
    </div>
  `).join("");

  return`
    <h2 class="section-title" style="margin-top:18px;">✨ Nouveautés</h2>
    <p class="muted" style="margin-bottom:16px;font-size:13px;">Tout ce qui ne rentre pas ailleurs — nouveau commerce, pop-up, attraction récente.</p>
    ${items}
    <button class="add-btn" onclick="addNouveaute()">+ Ajouter une nouveauté</button>
  `;
}
function addNouveaute(){
  data.nouveautes = data.nouveautes||[];
  data.nouveautes.push({name:"",badge:"Nouveau",note:"",maps:""});
  renderTab();
}
function removeNouveaute(i){
  data.nouveautes.splice(i,1);
  renderTab();
}

/* ============================================================
   SAVE & UTILS
   ============================================================ */
function saveAll(){ saveData(); }
function openGuide(){ window.open(GUIDE_URL, "_blank"); }
function escHtml(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
</script>
